<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Speech Emotion Agent</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .result-box {
            display: none;
            border-left: 5px solid #0d6efd;
            background-color: #eef5ff;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card main-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark"><i class="bi bi-mic-fill text-primary"></i> Speech Emotion Recognition</h2>
                    <p class="text-muted">Upload an audio recording to analyze the emotion and receive an automated advisory response.</p>
                </div>

                <hr class="mb-4">

                <form id="uploadForm">
                    <div class="mb-4">
                        <label for="audioFile" class="form-label fw-semibold">Select Audio File (.wav format recommended)</label>
                        <div class="input-group">
                            <input type="file" class="form-relative form-control" id="audioFile" accept="audio/*" required>
                            <span class="input-group-text"><i class="bi bi-file-earmark-music"></i></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold" id="submitBtn">
                        <span id="btnText"><i class="bi bi-cpu"></i> Analyze Speech Emotion</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>

                <!-- Results Output Section -->
                <div class="result-box p-4 mt-4 rounded" id="resultDiv">
                    <h4 class="fw-bold text-primary mb-2" id="detectedEmotion">Detected Emotion: </h4>
                    <p class="mb-0 text-dark italic" id="agentResponse"></p>
                </div>

                <!-- Error Messages Alert Area -->
                <div class="alert alert-danger mt-4 d-none" id="errorDiv" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<!-- Frontend Logic Script -->
<script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const audioFile = document.getElementById('audioFile').files[0];
        const formData = new FormData();
        formData.append('audio_file', audioFile);

        // UI States
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const resultDiv = document.getElementById('resultDiv');
        const errorDiv = document.getElementById('errorDiv');

        submitBtn.disabled = true;
        btnText.classList.add('d-none');
        btnSpinner.classList.remove('d-none');
        resultDiv.style.display = 'none';
        errorDiv.classList.add('d-none');

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (response.ok && data.status === 'success') {
                document.getElementById('detectedEmotion').innerHTML = `<i class="bi bi-emoji-expressionless"></i> Detected Emotion: ${data.emotion}`;
                document.getElementById('agentResponse').innerHTML = `<strong>Agent Response:</strong> "${data.response}"`;
                resultDiv.style.display = 'block';
            } else {
                errorDiv.innerText = data.error || 'An error occurred during audio feature extraction.';
                errorDiv.classList.remove('d-none');
            }
        } catch (error) {
            errorDiv.innerText = 'Failed to communicate with the server application backend.';
            errorDiv.classList.remove('d-none');
        } finally {
            submitBtn.disabled = false;
            btnText.classList.remove('d-none');
            btnSpinner.classList.add('d-none');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
